<div class="modal-overlay" *ngIf="modalConfig.isOpen" (click)="onOverlayClick($event)">
  <div class="modal-container">
    <button class="modal-close" (click)="close()">✕</button>

    <!-- Квиз -->
    <app-quiz *ngIf="modalConfig.type === 'quiz'"></app-quiz>

    <!-- Обратный звонок -->
    <app-callback *ngIf="modalConfig.type === 'callback'"></app-callback>

    <!-- Showroom (добавить позже) -->
  </div>
</div>
